<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 已移除 Unsplash 图片依赖，改用纯 CSS 渐变背景 + emoji 占位 -->
<title>下顿吃什么</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}

.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 50px 20px 10px;
  position: relative;
  z-index: 1;
}

.header h1 {
  font-size: 48px;
  color: #fff;
  margin-bottom: 6px;
  letter-spacing: 3px;
  text-shadow: 0 2px 12px rgba(232,93,58,0.4);
}

.header .subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 1px;
  line-height: 1.6;
  max-width: 320px;
  margin: 0 auto;
}

/* ===== Dice area ===== */
.dice-area {
  text-align: center;
  padding: 24px 0 20px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.btn-dice {
  background: linear-gradient(135deg, #e85d3a, #f08060);
  color: #fff;
  border: none;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  font-size: 32px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 28px rgba(232,93,58,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-dice:hover:not(.disabled) {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 10px 36px rgba(232,93,58,0.55);
}

.btn-dice:active:not(.disabled) {
  transform: scale(0.93);
}

.btn-dice.rolling {
  animation: diceRoll 0.8s ease-out;
}

.btn-dice.disabled {
  background: #3a3a4a;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  cursor: not-allowed;
  opacity: 0.5;
}

@keyframes diceRoll {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(120deg) scale(1.15); }
  50% { transform: rotate(300deg) scale(0.9); }
  75% { transform: rotate(480deg) scale(1.08); }
  100% { transform: rotate(720deg) scale(1); }
}

.roll-counter {
  display: flex;
  gap: 8px;
  align-items: center;
}

.roll-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #e85d3a;
  transition: all 0.4s;
  box-shadow: 0 0 8px rgba(232,93,58,0.5);
}

.roll-dot.used {
  background: #3a3a4a;
  box-shadow: none;
}

.roll-text {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 1px;
}

.disclaimer-float {
  position: fixed;
  left: 16px;
  bottom: 16px;
  z-index: 2;
  max-width: 280px;
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.6;
  color: rgba(255,255,255,0.55);
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  backdrop-filter: blur(6px);
  pointer-events: none;
}

.qrcode-float {
  position: fixed;
  right: 16px;
  bottom: 16px;
  z-index: 2;
  padding: 10px;
  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);
  text-align: center;
}

.qrcode-float img {
  display: block;
  width: 100px;
  height: 100px;
  border-radius: 4px;
}

.qrcode-float span {
  display: block;
  margin-top: 6px;
  font-size: 11px;
  color: rgba(0,0,0,0.55);
  line-height: 1.4;
}

/* ===== Main card ===== */
.card-stage {
  max-width: 400px;
  margin: 0 auto;
  padding: 0 20px 50px;
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.card-container {
  aspect-ratio: 3 / 4;
  perspective: 1000px;
  flex-shrink: 0;
  animation: cardSlideIn 0.5s ease-out;
}

@keyframes cardSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-container.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 24px;
  overflow: hidden;
}

/* --- Front: unrevealed --- */
.card-front {
  background: linear-gradient(145deg, #1e2a3a, #151d2b);
  border: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  transition: all 0.4s;
}

.card-front .mystery-emoji {
  font-size: 80px;
  transition: all 0.5s;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.card-front .mystery-text {
  font-size: 22px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 3px;
}

/* --- Front: revealed --- */
.card-front.revealed {
  border-color: rgba(232,93,58,0.25);
  box-shadow: 0 12px 48px rgba(232,93,58,0.15);
}

.card-front.revealed .mystery-emoji {
  animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}

.card-front.revealed .mystery-text {
  color: #fff;
  font-size: 32px;
  font-weight: bold;
  animation: fadeSlideIn 0.5s ease-out 0.15s both;
}

.card-front.revealed .mystery-hint {
  display: block;
  font-size: 14px;
  color: rgba(255,255,255,0.35);
  animation: fadeSlideIn 0.5s ease-out 0.3s both;
}

.card-front .mystery-hint {
  display: none;
}

.card-container:not(.flipped):hover .card-front.revealed {
  transform: scale(1.02);
  border-color: rgba(232,93,58,0.5);
  cursor: pointer;
}

@keyframes popIn {
  0% { transform: scale(0.3); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Back face --- */
.card-back {
  background: #fff;
  color: #333;
  transform: rotateY(180deg);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  padding: 22px;
  overflow-y: auto;
}

.card-back .back-title {
  font-size: 18px;
  color: #e85d3a;
  text-align: center;
  padding-bottom: 12px;
  border-bottom: 2px solid #fdd9cf;
  margin-bottom: 14px;
  letter-spacing: 1px;
}

.card-back .recipe-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

.card-back .recipe-item {
  background: #fef9f0;
  border-radius: 12px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.card-back .recipe-item:hover {
  background: #fff5f2;
  border-color: #fdd9cf;
  transform: translateX(4px);
}

.card-back .recipe-thumb {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
  background: #fdd9cf;
}

.card-back .recipe-thumb-placeholder {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  flex-shrink: 0;
  background: #fdd9cf;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.card-back .recipe-item-body { flex: 1; min-width: 0; }

.card-back .recipe-item .recipe-name {
  font-size: 15px;
  font-weight: 600;
  color: #333;
  margin-bottom: 4px;
}

.card-back .recipe-meta-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 5px;
}

.card-back .recipe-meta-tag {
  background: #fff;
  color: #888;
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 10px;
  border: 1px solid #eee;
}

.card-back .recipe-item .recipe-ingredients {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.card-back .recipe-item .mini-tag {
  background: #fdd9cf;
  color: #b8543a;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
}

.card-back .back-footer {
  text-align: center;
  margin-top: 12px;
  font-size: 12px;
  color: #ccc;
  cursor: pointer;
  transition: color 0.2s;
  flex-shrink: 0;
}

.card-back .back-footer:hover { color: #e85d3a; }

.card-back::-webkit-scrollbar { width: 4px; }
.card-back::-webkit-scrollbar-thumb { background: #eee; border-radius: 2px; }
.card-back::-webkit-scrollbar-track { background: transparent; }

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.modal-overlay.active { display: flex; }

.modal {
  background: #fff;
  color: #333;
  border-radius: 18px;
  max-width: 640px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: modalIn 0.3s ease-out;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-close-bar {
  position: sticky;
  top: 0;
  z-index: 2;
  display: flex;
  justify-content: flex-end;
  padding: 12px 14px 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, transparent 100%);
  margin-bottom: -44px;
}

.modal-close-bar .close-btn {
  background: rgba(255,255,255,0.25);
  border: none;
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  backdrop-filter: blur(4px);
}

.modal-close-bar .close-btn:hover { background: rgba(255,255,255,0.45); }

.recipe-hero {
  position: relative;
  height: 200px;
  overflow: hidden;
  border-radius: 18px 18px 0 0;
  background: linear-gradient(135deg, #e85d3a, #f08060);
}

.recipe-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.recipe-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 55%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 20px 24px;
}

.recipe-hero-overlay h2 {
  font-size: 24px;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  margin-bottom: 4px;
}

.recipe-hero-overlay .hero-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
}

.modal-body { padding: 20px 24px 28px; }

.modal-body .section { margin-bottom: 22px; }
.modal-body .section:last-child { margin-bottom: 0; }

.modal-body .section h4 {
  font-size: 16px;
  color: #e85d3a;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.recipe-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}

.recipe-meta-pill {
  background: #fff5f2;
  color: #e85d3a;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 13px;
  border: 1px solid #fdd9cf;
}

.ingredient-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px 16px;
  background: #fef9f0;
  border-radius: 12px;
  padding: 14px 16px;
}

.ingredient-grid-row {
  display: contents;
}

.ingredient-grid-row .ing-name {
  font-size: 14px;
  color: #333;
  font-weight: 500;
}

.ingredient-grid-row .ing-amount {
  font-size: 13px;
  color: #888;
  text-align: right;
  white-space: nowrap;
}

.step-cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.step-card {
  background: #fafafa;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #eee;
}

.step-card-body {
  padding: 14px 16px 16px;
}

.step-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.step-num {
  width: 28px;
  height: 28px;
  background: #e85d3a;
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: bold;
  flex-shrink: 0;
}

.step-card-header h5 {
  font-size: 15px;
  font-weight: 600;
  color: #333;
}

.step-card-text {
  font-size: 14px;
  line-height: 1.75;
  color: #555;
  padding-left: 38px;
}

.step-tip {
  margin-top: 10px;
  margin-left: 38px;
  background: #fff5f2;
  border-left: 3px solid #e85d3a;
  padding: 8px 12px;
  border-radius: 0 8px 8px 0;
  font-size: 13px;
  color: #b8543a;
  line-height: 1.6;
}

.step-tip::before {
  content: '💡 ';
}

.modal::-webkit-scrollbar { width: 6px; }
.modal::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
.modal::-webkit-scrollbar-track { background: transparent; }

/* ===== Responsive ===== */
@media (max-width: 500px) {
  .header { padding: 36px 16px 6px; }
  .header h1 { font-size: 34px; }
  .card-stage { max-width: 320px; padding: 0 16px 40px; }
  .card-front .mystery-emoji { font-size: 60px; }
  .card-front.revealed .mystery-text { font-size: 26px; }
  .card-back { padding: 16px; }
  .card-back .recipe-item { padding: 10px; }
  .card-back .recipe-item .recipe-name { font-size: 13px; }
  .modal { max-width: 100%; border-radius: 14px; }
  .recipe-hero { height: 160px; border-radius: 14px 14px 0 0; }
  .recipe-hero-overlay { padding: 16px 18px; }
  .recipe-hero-overlay h2 { font-size: 20px; }
  .modal-body { padding: 16px 18px 22px; }
  .step-card-text, .step-tip { padding-left: 0; margin-left: 0; }
  .step-card-header { margin-bottom: 6px; }
  .disclaimer-float {
    left: 12px;
    right: 12px;
    bottom: 12px;
    max-width: none;
    font-size: 11px;
    padding: 8px 12px;
  }
  .qrcode-float {
    right: 12px;
    bottom: 12px;
    padding: 8px;
  }
  .qrcode-float img {
    width: 80px;
    height: 80px;
  }
  .qrcode-float span { font-size: 10px; margin-top: 4px; }
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="header">
  <h1>下顿吃什么</h1>
  <p class="subtitle">别在外面吃了，一个人的生活也需要烟火气</p>
</div>

<div class="dice-area">
  <button class="btn-dice" id="btnDice" onclick="rollDice()">🎲</button>
  <div class="roll-counter" id="rollCounter"></div>
  <span class="roll-text" id="rollText"></span>
</div>

<div class="card-stage" id="cardStage"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal"></div>
</div>

<div class="disclaimer-float">

  更多趣味内容请关注公众号：AIdeaHub<br>
  聚AI灵感，趣味随心览
</div>

function escapeHtml(str) {

function hideBrokenImage(el) {

// ===== 食谱规范化 =====
function normalizeRecipe(raw) {
  function normalizeStep(s, idx) {
    if (typeof s === 'object') {
      return { title: s.title, text: s.text, tip: s.tip || '' };
    }
    return { title: '步骤 ' + (idx + 1), text: s, tip: '' };
  }
  if (raw.steps && raw.steps.length && typeof raw.steps[0] === 'object') {
    return {
      name: raw.name,
      cover: raw.cover || '',
      meta: raw.meta || { time: '', difficulty: '', servings: '' },
      ingredients: raw.ingredients.map(function(i) {
        return typeof i === 'string' ? { name: i, amount: '' } : i;
      }),
      steps: raw.steps.map(normalizeStep)
    };
  }
  return {
    name: raw.name,
    cover: raw.cover || '',
    meta: raw.meta || { time: '', difficulty: '', servings: '' },
    ingredients: raw.ingredients.map(function(i) {
      return typeof i === 'string' ? { name: i, amount: '' } : i;
    }),
    steps: raw.steps.map(normalizeStep)
  };
}

// 版本升级时一次性重置今日次数（之后仍按每日 3 次累计）
function migrateRollLimitIfNeeded() {
  const MIGRATION_KEY = 'rolls_limit_v3';
  if (!localStorage.getItem(MIGRATION_KEY)) {
    resetTodayRolls();
    localStorage.setItem(MIGRATION_KEY, '1');
  }
}

function getRollsUsed() {
  const key = getTodayKey();
  const val = localStorage.getItem(key);
  return val ? parseInt(val) : 0;
}

function incrementRolls() {
  const key = getTodayKey();
  const used = getRollsUsed() + 1;
  localStorage.setItem(key, used);
  // 清理旧日期的记录
  const allKeys = Object.keys(localStorage);
  for (const k of allKeys) {
    if (k.startsWith('rolls_') && k !== key) {
      localStorage.removeItem(k);
    }
  }
}

function getRemainingRolls() {
  return Math.max(0, MAX_ROLLS - getRollsUsed());
}

// ===== 背景粒子 =====
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.width = (Math.random() * 60 + 20) + 'px';
    p.style.height = p.style.width;
    p.style.left = (Math.random() * 100) + '%';
    p.style.animationDuration = (Math.random() * 10 + 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    container.appendChild(p);
  }
}

// ===== 渲染点数 =====
function renderRollDots() {
  const container = document.getElementById('rollCounter');
  const used = getRollsUsed();
  const remaining = getRemainingRolls();
  let html = '';
  for (let i = 0; i < MAX_ROLLS; i++) {
    html += `<span class="roll-dot${i < used ? ' used' : ''}"></span>`;
  }
  container.innerHTML = html;

  const textEl = document.getElementById('rollText');
  const btn = document.getElementById('btnDice');

  if (remaining === 0) {
    textEl.textContent = '别翻啦，别翻啦，行动起来吧！';
    btn.classList.add('disabled');
  } else {
    textEl.textContent = '剩余 ' + remaining + ' 次';
    btn.classList.remove('disabled');
  }
}

// ===== 掷骰子 =====
function rollDice() {
  const remaining = getRemainingRolls();
  if (remaining === 0) return;

  const btn = document.getElementById('btnDice');
  btn.classList.add('rolling');
  setTimeout(function() { btn.classList.remove('rolling'); }, 800);

  const idx = Math.floor(Math.random() * allIngredients.length);
  const ingredient = allIngredients[idx];

  incrementRolls();
  renderRollDots();

  addCard(ingredient);
}

// ===== 新增卡片（保留已有卡片） =====
function addCard(ingredient) {
  const cardId = cardIdCounter++;
  const emoji = emojiMap[ingredient] || '🍳';
  const stage = document.getElementById('cardStage');

  const container = document.createElement('div');
  container.className = 'card-container';
  container.id = 'card-' + cardId;
  container.dataset.ingredient = ingredient;

  container.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front" onclick="onCardClick(${cardId})">
        <div class="mystery-emoji">${emoji}</div>
        <div class="mystery-text">${escapeHtml(ingredient)}</div>
        <span class="mystery-hint">点击翻开看做法</span>
      </div>
      <div class="card-face card-back">${buildCardBackHtml(ingredient, cardId)}</div>
    </div>
  `;

  stage.appendChild(container);

  setTimeout(function() {
    container.querySelector('.card-front').classList.add('revealed');
  }, 200);

  setTimeout(function() {
    container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 300);
}

function buildCardBackHtml(ingredient, cardId) {
  const emoji = emojiMap[ingredient] || '🍳';
  const recipes = recipeDB[ingredient].map(normalizeRecipe);

  const listHtml = recipes.map(function(r, ri) {
    const thumb = r.cover
      ? `<img class="recipe-thumb" src="${escapeHtml(r.cover)}" alt="${escapeHtml(r.name)}" loading="lazy" onerror="hideBrokenImage(this)">`
      : `<div class="recipe-thumb-placeholder">${emoji}</div>`;
    const metaTags = [r.meta.time, r.meta.difficulty].filter(Boolean)
      .map(function(t) { return `<span class="recipe-meta-tag">${escapeHtml(t)}</span>`; }).join('');
    const tags = r.ingredients.slice(0, 4).map(function(ing) {
      const label = ing.amount ? ing.name + ' ' + ing.amount : ing.name;
      return `<span class="mini-tag">${escapeHtml(label)}</span>`;
    }).join('');
    return `
      <div class="recipe-item" onclick="event.stopPropagation(); showDetail('${ingredient}', ${ri})">
        ${thumb}
        <div class="recipe-item-body">
          <div class="recipe-name">${escapeHtml(r.name)}</div>
          ${metaTags ? `<div class="recipe-meta-tags">${metaTags}</div>` : ''}
          <div class="recipe-ingredients">${tags}</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="back-title">${emoji} ${escapeHtml(ingredient)} · ${recipes.length}种做法</div>
    <div class="recipe-list">${listHtml}</div>
    <div class="back-footer" onclick="event.stopPropagation(); unflipCard(${cardId})">▲ 翻回正面</div>
  `;
}

// ===== 点击卡片正面 =====
function onCardClick(cardId) {
  const container = document.getElementById('card-' + cardId);
  if (!container || container.classList.contains('flipped')) return;
  container.classList.add('flipped');
}

function unflipCard(cardId) {
  const container = document.getElementById('card-' + cardId);
  if (container) container.classList.remove('flipped');
}

// ===== 详情弹窗 =====
function showDetail(ingredient, index) {
  const recipe = normalizeRecipe(recipeDB[ingredient][index]);
  const overlay = document.getElementById('modalOverlay');
  const modal = document.getElementById('modal');

  const metaPills = [recipe.meta.time, recipe.meta.difficulty, recipe.meta.servings]
    .filter(Boolean)
    .map(function(m) { return `<span class="recipe-meta-pill">${escapeHtml(m)}</span>`; })
    .join('');

  const ingredientRows = recipe.ingredients.map(function(ing) {
    return `
      <div class="ingredient-grid-row">
        <span class="ing-name">${escapeHtml(ing.name)}</span>
        <span class="ing-amount">${escapeHtml(ing.amount || '适量')}</span>
      </div>`;
  }).join('');

  const stepCards = recipe.steps.map(function(step, idx) {
    const tipHtml = step.tip
      ? `<div class="step-tip">${escapeHtml(step.tip)}</div>`
      : '';
    return `
      <div class="step-card">
        <div class="step-card-body">
          <div class="step-card-header">
            <span class="step-num">${idx + 1}</span>
            <h5>${escapeHtml(step.title)}</h5>
          </div>
          <div class="step-card-text">${escapeHtml(step.text)}</div>
          ${tipHtml}
        </div>
      </div>`;
  }).join('');

  const heroImg = recipe.cover
    ? `<img src="${escapeHtml(recipe.cover)}" alt="${escapeHtml(recipe.name)}" loading="lazy" onerror="hideBrokenImage(this)">`
    : '';

  modal.innerHTML = `
    <div class="recipe-hero">
      ${heroImg}
      <div class="modal-close-bar">
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="recipe-hero-overlay">
        <h2>${escapeHtml(recipe.name)}</h2>
        <div class="hero-sub">主食材：${escapeHtml(ingredient)}</div>
      </div>
    </div>
    <div class="modal-body">
      ${metaPills ? `<div class="section"><div class="recipe-meta">${metaPills}</div></div>` : ''}
      <div class="section">
        <h4>🧂 所需配料</h4>
        <div class="ingredient-grid">${ingredientRows}</div>
      </div>
      <div class="section">
        <h4>👨‍🍳 详细步骤</h4>
        <div class="step-cards">${stepCards}</div>
      </div>
    </div>
  `;

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ===== 启动 =====
createParticles();
migrateRollLimitIfNeeded();
renderRollDots();
</script>

</body>
</html>
